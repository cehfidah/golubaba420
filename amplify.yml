version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies
        - npm ci --legacy-peer-deps
    
    build:
      commands:
        # Build Next.js app - environment variables from Amplify console will be available
        - npm run build
  
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*


